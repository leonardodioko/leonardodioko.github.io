<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Interface | Dioko & Sons</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="container">
        <nav>
            <a href="index.html">Overview</a>
            <a href="news.html">News & Articles</a>
            <a href="contact.html">Contact Us</a>
        </nav>

        <header>
            <h1>Contact Us</h1>
        </header>

        <p>Hi there. How can we help you?</p>
        
        <form action="https://formbold.com/s/oJa4Y" method="POST">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit">Submit Inquiry</button>
        </form>

      <footer>
            <p>Unit 2904-05, 29/F, Universal Trade Centre, 3 Arbuthnot Road, Central, Hong Kong S.A.R</p>
            <p>&copy; 2026 Dioko & Sons. All rights reserved.</p>
        </footer>
    </div>

</body>
</html>
